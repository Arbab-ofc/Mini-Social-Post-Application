version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: mini-social-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: mini-social-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGODB_URI: mongodb://mongo:27017/mini_social_post_app
      JWT_SECRET: change_this_secret_in_production
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: uploads
    ports:
      - '5001:5001'
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001/api
    container_name: mini-social-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongo_data:
